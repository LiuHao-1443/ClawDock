name: Bug Report
description: Report a bug or unexpected behavior in ClawDock
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below to help us diagnose and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce the behavior.
      placeholder: |
        1. Open ClawDock
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: windows-version
    attributes:
      label: Windows Version
      description: "e.g. Windows 11 23H2"
      placeholder: Windows 11 23H2
    validations:
      required: true

  - type: input
    id: clawdock-version
    attributes:
      label: ClawDock Version
      description: "e.g. 0.6.2"
      placeholder: "0.6.2"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or log output to help explain the issue.
    validations:
      required: false
