name: CI

on:
  push:
    branches: [master, feature/tauri-crossplatform]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-test:
    name: Rust Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/tauri-app/src-tauri

      - name: Run tests
        working-directory: src/tauri-app/src-tauri
        run: cargo test --verbose

  frontend-check:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/tauri-app/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: src/tauri-app
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: src/tauri-app
        run: pnpm tsc --noEmit

      - name: Run tests
        working-directory: src/tauri-app
        run: pnpm test

  build:
    name: Build (${{ matrix.os }})
    needs: [rust-test, frontend-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - os: macos-13
            target: x86_64-apple-darwin
            bundles: dmg
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/tauri-app/src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libayatana-appindicator3-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/tauri-app/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: src/tauri-app
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        working-directory: src/tauri-app
        run: pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: clawdock-windows
          path: |
            src/tauri-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: clawdock-macos-${{ matrix.target }}
          path: |
            src/tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: clawdock-linux
          path: |
            src/tauri-app/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src/tauri-app/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
